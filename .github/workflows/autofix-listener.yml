name: Autofix

# Infra-flake auto-rerun for CI / Release failures on main.
#
# Division of labor (user decision 2026-07-10 — no Claude OAuth token on a
# public repo, so the fix agent lives on the local machine instead):
#   - PREVENTION: hooks/pre-push-ci-gate.sh runs the CI-equivalent checks
#     (shellcheck + tsc + bun test) before any push leaves a dev checkout.
#   - THIS LISTENER: the one thing only GitHub can do fast — when a run fails
#     because GitHub infra never ran it (runner never acquired / VM lost;
#     class first seen ai-brain run 29019035006), rerun the failed jobs
#     within a minute. Nothing in-repo to fix, so no fixer needed.
#   - REMEDIATION: brain-ops/scripts/ci-watchdog.ts (launchd, every 30 min,
#     Mac mini) sees any still-red latest run on main and files an AFK issue
#     on sonthanh/ai-brain — the existing autonomous loop fixes it locally.
#   - ALERTING: ci.yml / release.yml already Telegram on their own failures;
#     this listener only speaks when it reruns (or fails to).
#
# Public-repo safety: fires ONLY for first-attempt failures of push-to-main
# runs of this repo — fork/PR events never reach it. Our own rerun produces a
# run_attempt=2 event which the job filter drops, so each failed run gets at
# most one rerun (no loops, no caps needed).

on:
  workflow_run:
    workflows: ["CI", "Release"]
    types: [completed]

permissions:
  contents: read
  actions: write    # read failed logs + rerun failed jobs

concurrency:
  group: autofix
  cancel-in-progress: false

jobs:
  autofix:
    # Genuine first-attempt failure of a push-to-main run of this repo only.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1 &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}
      WF_NAME: ${{ github.event.workflow_run.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Detect infra-class failure
        id: detect
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" --repo "$REPO" --log-failed > /tmp/failed.log 2>&1 || \
            gh run view "$RUN_ID" --repo "$REPO" --log > /tmp/failed.log 2>&1 || true
          tail -c 12000 /tmp/failed.log > /tmp/failed.tail.log || cp /tmp/failed.log /tmp/failed.tail.log
          echo "=== failed log tail ==="; cat /tmp/failed.tail.log

          # Infra evidence lives in job ANNOTATIONS, not step logs (which are
          # empty when the runner never ran anything).
          ANNOTATIONS=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[].id] | @tsv' 2>/dev/null | tr '\t' '\n' | while read -r JOB; do
              gh api "repos/$REPO/check-runs/$JOB/annotations" --jq '.[].message' 2>/dev/null || true
            done)
          echo "=== annotations ==="; echo "$ANNOTATIONS"
          INFRA=false
          if echo "$ANNOTATIONS" | grep -qiE 'not acquired by (a )?[Rr]unner|lost communication with the server|runner has received a shutdown signal|hosted runner encountered an error'; then
            INFRA=true
          elif [ ! -s /tmp/failed.tail.log ] || ! grep -q '[^[:space:]]' /tmp/failed.tail.log; then
            # No failed-step output at all — nothing a code fix could target.
            INFRA=true
          fi
          echo "infra=$INFRA" >> "$GITHUB_OUTPUT"
          if [ "$INFRA" != true ]; then
            echo "real failure — ci-watchdog on the Mac mini files the fix issue; nothing to do here"
          fi

      - name: Rerun failed jobs
        id: rerun
        if: steps.detect.outputs.infra == 'true'
        run: |
          set -euo pipefail
          gh run rerun "$RUN_ID" --repo "$REPO" --failed
          echo "reran failed jobs of $WF_NAME run $RUN_ID after infra-class failure"

      - name: Notify (Telegram — only when we acted or failed to)
        if: always() && steps.detect.outputs.infra == 'true'
        uses: sonthanh/brain-ops/actions/telegram-send@v0
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: >-
            ${{ steps.rerun.outcome == 'success'
              && format('♻️ {0} failed on GitHub infra (runner never acquired / VM lost) — reran the failed jobs. Failed run: {1}', github.event.workflow_run.name, github.event.workflow_run.html_url)
              || format('❌ {0} failed on GitHub infra AND the rerun errored — rerun manually: gh run rerun {1} --failed. Failed run: {2}', github.event.workflow_run.name, github.event.workflow_run.id, github.event.workflow_run.html_url) }}
