name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'install.sh'
      - 'brain-os.config.md'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped: $CURRENT → $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          # [skip ci] prevents this commit from re-triggering the workflow
          git commit -m "release: v${{ steps.version.outputs.version }} [skip ci]"
          # Retry with rebase: concurrent sessions push to main mid-release
          # (failed runs 24579320270, 25458995995 were exactly this race).
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push attempt ${attempt} rejected — rebasing on fresh main"
            git pull --rebase origin main
            sleep 3
          done
          git push

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --generate-notes --title "$TAG"

      - name: Notify on failure
        if: failure()
        uses: sonthanh/brain-ops/actions/telegram-send@v0
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: "Release failed. Check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
